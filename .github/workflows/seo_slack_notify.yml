name: SEO Rank Checker to Slack

on:
  schedule:
    # 毎日 日本時間の午後14時 (UTCの午前5時) に実行
    - cron: '0 5 * * *'
  workflow_dispatch: # GitHubの画面から手動実行できるようにする

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Rank Checker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGETS_JSON: ${{ vars.TARGETS_JSON }}
        run: python check_rank.py
